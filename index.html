<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tian AI — 智能对话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #1a1a2e;
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .version { font-size: 12px; color: #888; background: #2a2a4a; padding: 2px 8px; border-radius: 10px; }
  .header .status { font-size: 12px; color: #4ade80; margin-left: auto; }
  .header .status.offline { color: #f87171; }
  .header .status.loading { color: #fbbf24; }

  .chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .message.user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
  .message.ai { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
  .message.error { background: #7f1d1d; align-self: center; text-align: center; }
  .message.tag { font-size: 11px; color: #666; margin-top: 4px; }

  .input-area {
    background: #1a1a2e;
    border-top: 1px solid #2a2a4a;
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: #0f0f1a;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e0e0e0;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
  }
  .input-area textarea:focus { border-color: #2563eb; }
  .input-area button {
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    height: 44px;
  }
  .input-area button:hover { background: #1d4ed8; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  .examples { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 24px 12px; }
  .examples button {
    background: #1e293b;
    border: 1px solid #2a2a4a;
    color: #94a3b8;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .examples button:hover { background: #334155; color: #e0e0e0; border-color: #475569; }

  .footer { text-align: center; padding: 8px; font-size: 11px; color: #555; background: #1a1a2e; }

  @media (max-width: 600px) {
    .message { max-width: 90%; }
    .chat-container { padding: 12px; }
    .input-area { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 Tian AI</h1>
  <span class="version" id="versionBadge">v-</span>
  <span class="status loading" id="statusText">连接中...</span>
</div>

<div class="examples" id="examples">
  <button>What is quantum computing?</button>
  <button>Who are you?</button>
  <button>Latest AI news 2025</button>
  <button>Explain neural networks</button>
</div>

<div class="chat-container" id="chatContainer">
  <div class="message ai">Hello! I'm Tian AI. Ask me anything, and I'll think, search, and respond. 🚀</div>
</div>

<div class="input-area">
  <textarea id="inputBox" placeholder="Type your message..." rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<div class="footer">
  Powered by Hugging Face Spaces &nbsp;|&nbsp; Tian AI M-series
</div>

<script>
const API_BASE = window.location.origin + '/api';
let isSending = false;

// ── DOM refs ──
const chat = document.getElementById('chatContainer');
const input = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');
const versionBadge = document.getElementById('versionBadge');

// ── Auto-resize textarea ──
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── Enter to send ──
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// ── Example buttons ──
document.querySelectorAll('.examples button').forEach(btn => {
  btn.addEventListener('click', () => { input.value = btn.textContent; send(); });
});

// ── Add message ──
function addMessage(role, text, tag = '') {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = text;
  chat.appendChild(div);
  if (tag) {
    const t = document.createElement('div');
    t.className = 'message tag';
    t.textContent = tag;
    chat.appendChild(t);
  }
  chat.scrollTop = chat.scrollHeight;
}

// ── Send ──
async function send() {
  const msg = input.value.trim();
  if (!msg || isSending) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', msg);
  isSending = true;
  sendBtn.disabled = true;

  try {
    const res = await fetch(API_BASE + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    if (data.error) {
      addMessage('error', 'Error: ' + data.error);
    } else {
      const mode = data.mode || 'fast';
      const search = data.search_used ? ' 🌐' : '';
      addMessage('ai', data.response, `[${mode.toUpperCase()}]${search} v${data.version}`);
    }
  } catch (e) {
    addMessage('error', 'Connection error: ' + e.message);
  }

  isSending = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── Check status ──
async function checkStatus() {
  try {
    statusText.textContent = '连接中...';
    statusText.className = 'status loading';
    const res = await fetch(API_BASE + '/status', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    versionBadge.textContent = 'v' + data.version;
    statusText.textContent = '在线';
    statusText.className = 'status';
  } catch (e) {
    statusText.textContent = '离线';
    statusText.className = 'status offline';
  }
}
checkStatus();
setInterval(checkStatus, 30000);
</script>

</body>
</html>
